name: Refresh dashboard

# Public Pages via GitHub Actions (no Jekyll). Each run pulls live Metabase,
# rebuilds index.html, and deploys it straight to Pages.

on:
  schedule:
    - cron: "0 2 * * *"        # 02:00 UTC = 07:30 IST, daily
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull data + build HTML
        env:
          METABASE_KEY: ${{ secrets.METABASE_KEY }}
          METABASE_URL: https://metabase.wiom.in
        run: |
          export AS_OF="$(date -u -d '+330 minutes' '+%d %b %Y')"
          python refresh.py
          python build.py
          mkdir -p site
          cp index.html dashboard_data.json site/
          touch site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
